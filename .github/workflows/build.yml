name: Build and Release YuyanIme APK

on:
  push:
    branches: [ master ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK (push to master)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: ./gradlew assembleOfflineDebug
        env:
          RELEASE_STORE_FILE: ''
          RELEASE_STORE_PASSWORD: ''
          RELEASE_KEY_ALIAS: ''
          RELEASE_KEY_PASSWORD: ''

      - name: Decode Keystore
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ${{ secrets.RELEASE_STORE_FILE }}

      - name: Build Release APK (tag only)
        if: startsWith(github.ref, 'refs/tags/')
        run: ./gradlew assembleOffline
        env:
          RELEASE_STORE_FILE: ${{ secrets.RELEASE_STORE_FILE }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: yuyan-ime-debug
          path: app/build/outputs/apk/offline/debug/*.apk
          retention-days: 90

      - name: Upload APKs to Release (tag only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/offline/release/*.apk
            app/build/outputs/apk/offline/debug/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
